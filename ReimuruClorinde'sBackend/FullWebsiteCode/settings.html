<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySnap AI - Settings</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body data-theme="light">
  <aside class="sidebar">
    <div class="sidebar-top">
      <h1 class="logo">StudySnap AI</h1>
      <nav class="nav-groups">
        <div class="nav-group">
          <p class="nav-title">Core</p>
          <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="subjects.html">Subjects</a></li>
            <li><a href="settings.html">Settings</a></li>
          </ul>
        </div>

        <div class="nav-group">
          <p class="nav-title">Subjects</p>
          <div id="subjectNav" class="subject-nav"></div>
          <p id="subjectNavEmpty" class="nav-empty">Upload a file to auto-create subjects.</p>
        </div>
      </nav>
    </div>
    <div class="user-profile">
      <img src="https://via.placeholder.com/40" alt="Avatar">
      <span>John Doe</span>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-nav">
      <input type="text" placeholder="Search your study space...">
      <div class="icons">
        <span class="notification">Notifications</span>
        <button id="theme-toggle" aria-label="Toggle theme">Dark mode</button>
        <img class="avatar" src="https://via.placeholder.com/32" alt="Avatar">
      </div>
    </header>

    <section class="section-block">
      <h2>User Settings</h2>
      <div class="card">
        <p><strong>Theme</strong></p>
        <button id="theme-toggle-settings" class="upload-btn">Toggle Dark/Light Mode</button>
      </div>
      <div class="card">
        <p><strong>Profile</strong></p>
        <p>Name: John Doe</p>
        <p>Email: john@example.com</p>
        <button class="upload-btn">Edit Profile</button>
      </div>
      <div class="card">
        <p><strong>Account</strong></p>
        <button class="upload-btn">Change Password</button>
        <button class="upload-btn">Delete Account</button>
      </div>
    </section>
  </main>
</body>
</html>
